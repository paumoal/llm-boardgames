services:
  - type: web
    name: llm-boardgames
    runtime: docker
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: boardgames-db
          property: connectionString

databases:
  - name: boardgames-db
    plan: free
    databaseName: boardgames
